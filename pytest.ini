[pytest]
testpaths   = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Always run with verbose output and short tracebacks
# -p no:warnings keeps the output clean during learning
addopts = -v --tb=short -p no:warnings

markers =
    smoke:      Quick sanity-check tests (subset run before full suite)
    regression: Full regression suite
    login:      Login module tests
    cart:       Cart module tests
    checkout:   Checkout module tests
    products:   Product listing tests
